<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>My Complaints</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins', sans-serif;

            background:
            linear-gradient(
            rgba(0,0,0,0.78),
            rgba(0,0,0,0.78)
            ),
            url('/images/bg.jpg');

            background-size:cover;
            background-position:center;

            min-height:100vh;

            padding:20px;

            color:white;

        }

        h1{

            text-align:center;

            margin-bottom:14px;

            color:#ff7b00;

            font-size:30px;

        }

        /* STATUS LEGEND */

        .legend{

            display:flex;

            gap:18px;

            justify-content:center;

            align-items:center;

            margin-bottom:18px;

            flex-wrap:wrap;

        }

        .legend-item{

            display:flex;

            align-items:center;

            gap:6px;

            font-size:12px;

            color:white;

        }

        .legend-color{

            width:12px;

            height:12px;

            border-radius:50%;

        }

        .pending{

            background:#ff7b00;

        }

        .progress{

            background:#3b82f6;

        }

        .resolved{

            background:#22c55e;

        }

        /* DASHBOARD */

        .dashboard{

            display:flex;

            justify-content:center;

            gap:12px;

            margin-bottom:18px;

            flex-wrap:wrap;

        }

        .dash-card{

            background:
            rgba(0,0,0,0.72);

            padding:12px 22px;

            border-radius:14px;

            text-align:center;

            min-width:120px;

            border:
            1px solid rgba(255,255,255,0.08);

        }

        .dash-card h2{

            font-size:24px;

            margin-bottom:4px;

            color:#ff7b00;

        }

        .dash-card p{

            font-size:12px;

            color:#e5e7eb;

        }

        .pending-card h2{

            color:#f59e0b;

        }

        .resolved-card h2{

            color:#22c55e;

        }

        /* SEARCH BOX */

        .search-box{

            display:flex;

            justify-content:center;

            margin-bottom:15px;

        }

        .search-box input{

            width:260px;

            padding:10px 16px;

            border:none;

            outline:none;

            border-radius:25px;

            font-size:13px;

            background:white;

        }

        /* TABLE */

        .table-container{

            background:
            rgba(0,0,0,0.72);

            border-radius:16px;

            overflow:hidden;

            backdrop-filter:blur(10px);

            border:
            1px solid rgba(255,255,255,0.08);

        }

        table{

            width:100%;

            border-collapse:collapse;

        }

        th{

            background:#ff7b00;

            color:white;

            padding:12px;

            font-size:13px;

            text-align:left;

        }

        td{

            padding:10px;

            border-bottom:
            1px solid rgba(255,255,255,0.08);

            color:#e5e7eb;

            font-size:12px;

            vertical-align:middle;

        }

        tr:hover{

            background:
            rgba(255,255,255,0.05);

        }

        img{

            width:65px;

            height:45px;

            object-fit:cover;

            border-radius:8px;

        }

        .status{

            padding:5px 12px;

            border-radius:18px;

            color:white;

            font-size:11px;

            font-weight:600;

        }

        .map-link{

            color:#60a5fa;

            text-decoration:none;

            font-weight:600;

        }

        .map-link:hover{

            text-decoration:underline;

        }

        .back-btn{

            display:inline-block;

            margin-top:18px;

            padding:10px 18px;

            border-radius:10px;

            text-decoration:none;

            background:
            linear-gradient(
            to right,
            #ff6a00,
            #ff8c1a
            );

            color:white;

            font-size:13px;

            font-weight:600;

        }

        /* MOBILE */

        @media(max-width:900px){

            .table-container{

                overflow-x:auto;

            }

            table{

                min-width:1000px;

            }

        }

    </style>

</head>

<body>

<h1>My Complaints</h1>

<!-- STATUS LEGEND -->

<div class="legend">

    <div class="legend-item">

        <span class="legend-color pending"></span>

        Pending

    </div>

    <div class="legend-item">

        <span class="legend-color progress"></span>

        In Progress

    </div>

    <div class="legend-item">

        <span class="legend-color resolved"></span>

        Resolved

    </div>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

    <div class="dash-card">

        <h2 id="totalCount">0</h2>

        <p>Total</p>

    </div>

    <div class="dash-card pending-card">

        <h2 id="pendingCount">0</h2>

        <p>Pending</p>

    </div>

    <div class="dash-card resolved-card">

        <h2 id="resolvedCount">0</h2>

        <p>Resolved</p>

    </div>

</div>

<!-- SEARCH BAR -->

<div class="search-box">

    <input type="text"
           id="searchInput"
           placeholder="Search complaints...">

</div>

<!-- TABLE -->

<div class="table-container">

    <table>

        <thead>

        <tr>

            <th>Image</th>

            <th>Title</th>

            <th>Category</th>

            <th>Description</th>

            <th>Map</th>

            <th>Status</th>

            <th>Date & Time</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="complaint : ${complaints}">

            <!-- IMAGE -->

            <td>

                <img th:src="@{'/uploads/' + ${complaint.imageName}}"
                     alt="Complaint">

            </td>

            <!-- TITLE -->

            <td th:text="${complaint.title}"></td>

            <!-- CATEGORY -->

            <td th:text="${complaint.category}"></td>

            <!-- DESCRIPTION -->

            <td th:text="${complaint.description}"></td>

            <!-- GOOGLE MAP -->

            <td>

                <a th:href="'https://www.google.com/maps/search/?api=1&query=' + ${complaint.location}"
                   target="_blank"
                   class="map-link">

                   📍 Open Map

                </a>

            </td>

            <!-- STATUS -->

            <td>

                <span class="status"

                      th:text="${complaint.status}"

                      th:style="${complaint.status == 'Resolved'} ?
                      'background:#22c55e;' :
                      (${complaint.status == 'In Progress'} ?
                      'background:#3b82f6;' :
                      'background:#ff7b00;')">

                </span>

            </td>

            <!-- DATE & TIME -->

            <td th:text="${#temporals.format(
                complaint.createdAt,
                'dd MMM yyyy - hh:mm a')}">

            </td>

        </tr>

        </tbody>

    </table>

</div>

<a href="/"
   class="back-btn">

    Back to Home

</a>

<!-- SCRIPT -->

<script>

// SEARCH

const searchInput =
document.getElementById("searchInput");

searchInput.addEventListener("keyup", function(){

    const value =
    this.value.toLowerCase();

    const rows =
    document.querySelectorAll("tbody tr");

    rows.forEach(row => {

        const text =
        row.innerText.toLowerCase();

        if(text.includes(value)){

            row.style.display = "";

        }
        else{

            row.style.display = "none";

        }

    });

});

// DASHBOARD COUNTS

const rows =
document.querySelectorAll("tbody tr");

document.getElementById("totalCount")
.innerText = rows.length;

let pending = 0;

let resolved = 0;

rows.forEach(row => {

    const status =
    row.querySelector(".status")
    .innerText
    .trim();

    if(status === "Pending"){

        pending++;

    }

    if(status === "Resolved"){

        resolved++;

    }

});

document.getElementById("pendingCount")
.innerText = pending;

document.getElementById("resolvedCount")
.innerText = resolved;

</script>

</body>

</html>
