<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Login</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins', sans-serif;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
            rgba(0,0,0,0.75),
            rgba(0,0,0,0.75)
            ),
            url('/images/bg.jpg');

            background-size:cover;

            background-position:center;

        }

        .login-box{

            width:100%;

            max-width:400px;

            background:
            rgba(0,0,0,0.72);

            padding:30px;

            border-radius:22px;

            backdrop-filter:blur(12px);

            border:
            1px solid rgba(255,255,255,0.08);

        }

        h1{

            text-align:center;

            color:#ff7b00;

            margin-bottom:25px;

        }

        input{

            width:100%;

            padding:12px;

            margin-bottom:15px;

            border:none;

            outline:none;

            border-radius:12px;

            font-size:14px;

        }

        button{

            width:100%;

            padding:12px;

            border:none;

            border-radius:12px;

            background:
            linear-gradient(
            to right,
            #ff6a00,
            #ff8c1a
            );

            color:white;

            font-size:15px;

            font-weight:600;

            cursor:pointer;

        }

        .error{

            color:#ef4444;

            text-align:center;

            margin-bottom:15px;

            font-size:13px;

        }

    </style>

</head>

<body>

<div class="login-box">

    <h1>Admin Login</h1>

    <div th:if="${error}"
         class="error">

        Invalid Admin Credentials

    </div>

    <form action="/adminlogin"
          method="post">

        <input type="text"
               name="username"
               placeholder="Enter admin username"
               required>

        <input type="password"
               name="password"
               placeholder="Enter admin password"
               required>

        <button type="submit">

            Login

        </button>

    </form>

</div>

</body>

</html>
