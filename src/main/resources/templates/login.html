<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Login - PublicPulse</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Poppins', sans-serif;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
            rgba(0,0,0,0.65),
            rgba(0,0,0,0.65)
            ),
            url('/images/bg.jpg');

            background-size:cover;

            background-position:center;

        }

        .login-container{

            width:360px;

            background:
            rgba(0,0,0,0.72);

            backdrop-filter:blur(15px);

            padding:28px;

            border-radius:24px;

            box-shadow:
            0px 12px 35px rgba(0,0,0,0.45);

            border:
            1px solid rgba(255,255,255,0.08);

        }

        .login-container h1{

            text-align:center;

            margin-bottom:22px;

            font-size:36px;

            font-weight:800;

            background:
            linear-gradient(
            to right,
            #f97316,
            #fb923c,
            #facc15
            );

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;

        }

        label{

            display:block;

            margin-bottom:6px;

            margin-top:12px;

            color:white;

            font-size:13px;

            font-weight:500;

        }

        input{

            width:100%;

            padding:11px;

            border:none;

            outline:none;

            border-radius:12px;

            font-size:13px;

            background:white;

        }

        input::placeholder{

            color:#6b7280;

        }

        .login-btn{

            width:100%;

            margin-top:20px;

            padding:11px;

            border:none;

            border-radius:12px;

            background:
            linear-gradient(
            to right,
            #ff6a00,
            #ff7b00
            );

            color:white;

            font-size:15px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;

        }

        .login-btn:hover{

            transform:scale(1.02);

        }

        .bottom-links{

            margin-top:18px;

            text-align:center;

            font-size:13px;

            color:#d1d5db;

        }

        .bottom-links a{

            color:#f97316;

            text-decoration:none;

            font-weight:500;

        }

        .bottom-links a:hover{

            text-decoration:underline;

        }

        /* ERROR MESSAGE */

        .error-message{

            background:#ef4444;

            color:white;

            padding:10px;

            border-radius:10px;

            margin-bottom:14px;

            text-align:center;

            font-size:13px;

            font-weight:500;

        }

    </style>

</head>

<body>

<div class="login-container">

    <h1>Login</h1>

    <!-- ERROR MESSAGE -->

    <div th:if="${error}"
         class="error-message">

        <span th:text="${error}"></span>

    </div>

    <form action="/login"
          method="post">

        <label>Email / Mobile</label>

        <input type="text"
               name="username"
               placeholder="Enter email or mobile"
               required>

        <label>Password</label>

        <input type="password"
               name="password"
               placeholder="Enter password"
               required>

        <button type="submit"
                class="login-btn">

            Login

        </button>

    </form>

    <div class="bottom-links">

        <p>

            Don't have an account?

            <a href="/signup">

                Signup

            </a>

        </p>

        <br>

        <a href="/forgot">

            Forgot Password?

        </a>

    </div>

</div>

</body>

</html>
